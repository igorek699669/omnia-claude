services:
  db:
    image: postgres:16
    container_name: omnia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-omnia}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - omnia-db-data:/var/lib/postgresql/data

  app:
    image: ghcr.io/igorek699669/omnia-claude:latest
    container_name: omnia-app
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-omnia}
    volumes:
      - omnia-media-data:/app/media

  caddy:
    image: caddy:2-alpine
    container_name: omnia-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - omnia-caddy-data:/data
      - omnia-caddy-config:/config

  # Отдельный тег из стадии "builder" — там есть devDependencies и CLI Better Auth/Payload,
  # которых нет в финальном рантайм-образе ("latest").
  # Запуск: docker compose -f docker-compose.prod.yml --profile tools run --rm migrate
  migrate:
    image: ghcr.io/igorek699669/omnia-claude:migrate
    container_name: omnia-migrate
    depends_on:
      - db
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-omnia}
    entrypoint: ["sh", "docker/migrate.sh"]
    profiles: ["tools"]

volumes:
  omnia-db-data:
  omnia-media-data:
  omnia-caddy-data:
  omnia-caddy-config:
