name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Build and push migrate image (builder stage, has CLI)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: true
          tags: ${{ env.IMAGE }}:migrate

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,POSTGRES_PASSWORD,BETTER_AUTH_SECRET,BETTER_AUTH_URL,PAYLOAD_SECRET,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASSWORD,SMTP_FROM
          script: |
            set -e
            mkdir -p /opt/omnia
            cd /opt/omnia
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            cat > .env <<EOF
            POSTGRES_USER=omnia
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=omnia
            EOF

            cat > .env.local <<EOF
            BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
            BETTER_AUTH_URL=${BETTER_AUTH_URL}
            PAYLOAD_SECRET=${PAYLOAD_SECRET}
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_SECURE=${SMTP_SECURE}
            SMTP_USER=${SMTP_USER}
            SMTP_PASSWORD=${SMTP_PASSWORD}
            SMTP_FROM=${SMTP_FROM}
            EOF

            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            # --profile tools обязателен и здесь: без него pull пропускает сервис migrate
            # (у него profiles: ["tools"]), и запускается старый закешированный образ.
            docker compose -f docker-compose.prod.yml --profile tools pull
            docker compose -f docker-compose.prod.yml --profile tools run --rm migrate
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
