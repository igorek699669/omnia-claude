services:
  db:
    image: postgres:16
    container_name: omnia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omnia
    ports:
      # Порт 5432 занят локальным Windows-сервисом Postgres — используем 5433.
      - "127.0.0.1:5433:5432"
    volumes:
      - omnia-db-data:/var/lib/postgresql/data

volumes:
  omnia-db-data:
